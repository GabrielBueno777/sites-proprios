<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FitPlus</title>
    <link rel="stylesheet" href="index.css">
</head>
<body style="background: linear-gradient(135deg, #004E89 0%, #1B998B 100%);">
    <div class="dashboard-container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>🏋️ FitPlus Dashboard</h1>
            </div>
            <div class="user-info">
                <p>Bem-vindo, <strong id="userName"></strong></p>
                <p>Plano: <strong id="userPlan">Sem Plano</strong></p>
                <button class="btn-logout" onclick="goToConfig()">Ver meu treino</button>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>

        <!-- Planos -->
        <h2 style="color: white; text-align: center; margin: 30px 0;">Escolha Seu Plano</h2>
        <div class="plans-grid" id="plansContainer">
            <!-- Será preenchido por JavaScript -->
        </div>

        <!-- Mensagens -->
        <div id="dashboardMessage" class="message"></div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
